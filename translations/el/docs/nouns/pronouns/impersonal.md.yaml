  original: Impersonal Pronouns
  translated: Απρόσωπες Αντωνυμίες
2f29305f82daeab541d2e5ebc77cf04c395414bf2cce0f9742b8a719:
  original:
    Arcadia has **two impersonal pronouns**, **"&{le}"** and **"&{alé}"**,
    which differ in **degree of specificity**.
  translated:
    Η Αρκαδία έχει **δύο απρόσωπες αντωνυμίες**, **"&{le}"** και **"&{alé}"**,
    οι οποίες διαφέρουν σε **βαθμό ειδικότητας**.
  literals:
    - alé
    - le
72052aec10afd7f24ba6ec521ed39667638f212e26b5132a94cb476a:
  original:
    Represents an **implied but relatively specific** vague subject (e.g.,
    a known general group).
  translated:
    Αντιπροσωπεύει ένα **υπονοούμενο αλλά σχετικά συγκεκριμένο** αόριστο
    υποκείμενο (π.χ. μια γνωστή γενική ομάδα).
d1cdc621155c1460c67fd4de4397e310010cf6161cae08309930b368:
  original:
    Represents a **fully indeterminate** or **diffuse** subject (e.g., society
    as a whole).
  translated:
    Αντιπροσωπεύει ένα **εντελώς αόριστο** ή **διάχυτο** υποκείμενο (π.χ.
    η κοινωνία στο σύνολό της).
