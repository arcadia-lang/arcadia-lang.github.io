db79d6c7286c5a186a489877977e21f4c71ee95a96e5574eb78d28ba:
  original:
    Arcadia recognizes **three core personal pronouns**, corresponding to
    **first, second, and third persons**.
  translated:
    Η Αρκάδια έχει **τρεις βασικές προσωπικές αντωνυμίες**, οι οποίες αντιστοιχούν
    **στο πρώτο, στο δεύτερο και στο τρίτο πρόσωπο**.
56c71753e69fec369c80f8dc18ad22da24839b53d2f612eba3661d70:
  original:
    The **fourth person** serves a **generalized reference**, expressing **all
    objects or none**—it is handled through **indefinite pronouns**, rather than a
    distinct personal form.
  translated:
    Το **τέταρτο πρόσωπο** χρησιμοποιείται για μια **γενικευμένη αναφορά**,
    εκφράζοντας **όλα τα αντικείμενα ή κανένα**—διαχειρίζεται μέσω **αόριστων αντωνυμιών**,
    παρά με μια ξεχωριστή προσωπική μορφή.
