50ff40ca3b6578fc15bcb74bde0b6b51c1557a473025e7b8d1cb830e:
  original: Gender
  translated: Γένος
06ee58c062b0e1af1e8d70140185d2af9d5ffb12df71df4b8e29abb7:
  original: Arcadia is **not a gendered language**.
  translated: Η Αρκάδια **δεν είναι έμφυλη γλώσσα**.
4598a10beecc280ab271eb37aacde5307a9c6d69c7a9018c18656a5f:
  original:
    Gender has **no effect** on grammatical rules—it is **purely semantic**,
    used only when relevant to specify the gender of an object or person.
  translated:
    Το γένος έχει **κανένα αποτέλεσμα** στους γραμματικούς κανόνες—είναι
    **καθαρά σημασιολογικό**, χρησιμοποιείται μόνο όταν είναι σχετικό για να προσδιορίσει
    το φύλο ενός αντικειμένου ή ατόμου.
7c5c5e34b62bf8640e6ca7a0013143d1823663a77fa50ee61b3167f7:
  original: Gender is marked by the prefixes **"vi-"** (male) and **"me-"** (female).
  translated:
    Το γένος δηλώνεται με τα προθέματα **"vi-"** (αρσενικό) και **"me-"**
    (θηλυκό).
d2e473ebe037cb0c309e9e8d9f773e2987196cd6800933d8ddf005b1:
  original: If gender **does not need to be specified**, the noun remains **unmarked**.
  translated:
    Αν το γένος **δεν χρειάζεται να προσδιοριστεί**, το ουσιαστικό παραμένει
    **απροσδιόριστο**.
5f6af4efc2b28fe75736d7fe213ff1ba0fd043da6f9884adff782c82:
  original: Using Gender
  translated: Χρήση Γένους
8a1e8e99530d64028d9f5afbed28cb5a3bf8be136e865dee81c35aaa:
  original:
    By default, gender **should not be marked** unless it is **explicitly
    relevant**.
  translated:
    Κατά προτίμηση, το γένος **δεν πρέπει να δηλώνεται** εκτός αν είναι
    **ρητά σχετικό**.
062dcf871583a2c748e2a514f6541e77d623376cc4f8149c63a11aee:
  original:
    For example, when referring to a child, **"filio"** is used unless specifying
    **"son"** (*vifilio*) or **"daughter"** (*mefilio*).
  translated:
    Για παράδειγμα, όταν αναφερόμαστε σε έναν απόγονο, χρησιμοποιούμε το
    **"filio"** εκτός αν προσδιορίζουμε **"γιός"** (*vifilio*) ή **"κόρη"** (*mefilio*).
