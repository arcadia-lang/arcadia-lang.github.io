52f9fa41ab6dc22350cb1fbfef52c8599247e9b5e8f504811a152035:
  original: Many natural languages treat certain tastes as opposites—for
    example, pairing "sweet" with "bitter."
  translated: Πολλές φυσικές γλώσσες θεωρούν ορισμένες γεύσεις ως αντίθετες—για
    παράδειγμα, συνδυάζοντας το «γλυκό» με το «πικρό».
276b887d406b81fa3cefdf7c802d27eb5daeb3cb0bcb9e4af76563a0:
  original: In Arcadia, however, taste words do not form binary oppositions.
  translated: Στην Αρκάδια, ωστόσο, οι λέξεις γεύσεων δεν σχηματίζουν τέτοια
    ζεύγη.
a00dcfde8a6bf260fb41eb6c9bdb773ed97a83fe17bc3819b73e02f1:
  original: Instead, the "opposite" of a taste reflects its absence or
    attenuation, not the presence of a contrasting flavour.
  translated: Αντίθετα, το «αντίθετο» μιας γεύσης αντικατοπτρίζει την απουσία ή
    την εξασθένηση της, όχι την παρουσία μιας αντίθετης γεύσης.
