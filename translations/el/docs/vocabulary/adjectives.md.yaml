ddb1318438f14bb3005cee5474a1da642791d9c767abbda0d05b0325:
  original: In Arcadia, adjectives match the **class of the noun they modify**,
    and thus exist in all five classes.
  translated: Στην Αρκάδια, τα επίθετα έχουν την **τάξη του ουσιαστικού που
    τροποποιούν**, και έτσι υπάρχουν και στις πέντε τάξεις.
1d9ffa70b87af9119a1a0bfc65e42bb3cce4786e8922945595e5316a:
  original: However, in dictionaries, adjectives are always listed in their
    **solid class** form.
