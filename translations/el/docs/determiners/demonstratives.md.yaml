    but are included here due to their close relationship with **deictic expressions**.
  translated:
    Τα _"-&{ove}"_, _"-&{uando}"_ και _"-&{ume}"_ **δεν είναι αληθινά δεικτικά**,
    αλλά περιλαμβάνονται εδώ λόγω της στενής τους σχέσης με τις **δεικτικές εκφράσεις**.
