  translated:
    Η Αρκαδία έχει τρία **δεσμευτικά στοιχεία δείξης**, που **ποτέ δεν χρησιμοποιούνται
    μόνα τους**.
aa93df5a09d4a1ad1146e0845e43df98a384d200b2aad027b9ed0e8f:
  original:
    Instead, they **attach to interrogatives** to add **spatial or temporal
    deixis**, specifying proximity or distance.
  translated:
    Αντίθετα, **συνδέονται με ερωτηματικές λέξεις** για να προσθέσουν **χωρική
    ή χρονική δείξη**, προσδιορίζοντας την εγγύτητα ή την απόσταση.
