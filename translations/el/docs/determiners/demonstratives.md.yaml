    **δεν μπορούν να εμφανιστούν ανεξάρτητα** στην ομιλία ή τη γραφή.
  literals:
    - ess
    - est
    - tis
b0e67684d10c693283c641c9374bd0e9dbc3782ac4ec34d0333e9cf6:
