a29469876cb7b0db40714f54085f4bbebb393e748da929db4910fc49:
  original:
    Marks **inalienable possession**, where the possessor is **an integral
    part** of the possessed.
  translated:
    Δηλώνει **μη αλλοτριωτή κατοχή**, όπου ο κάτοχος είναι **αναπόσπαστο
    μέρος** του κατεχόμενου.
e555457bbef3c657df49a49a431ee9b13b3292fc5c62e3f380d864c3:
