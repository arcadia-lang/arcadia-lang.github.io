    Marks **alienable possession**, where the possessor is **not inherently
    connected** to the possessed.
  translated:
    Δηλώνει **αλλοτριωτή κατοχή**, όπου ο κάτοχος **δεν είναι εγγενώς συνδεδεμένος**
    με το κατεχόμενο.
93694d686cbd974b59191648c024c5344ae1f460a941877f906976b3:
