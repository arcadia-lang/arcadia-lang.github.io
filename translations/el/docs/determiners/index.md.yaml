358ae51edcefdd53bf89e95e47a6308de387fc45d39fbc842d7d584d:
  original: Determiners
  translated: Προσδιοριστές
aaafec6ea294049adfbd864f2144971269e9e060f3bae1bc743e4075:
  original:
    Determiners are words that precede a noun, providing additional information
    about **its reference, quantity, or specificity**.
  translated:
    Οι προσδιοριστές είναι λέξεις που προηγούνται ενός ουσιαστικού, παρέχοντας
    πρόσθετες πληροφορίες σχετικά με **την αναφορά, την ποσότητα ή την ειδικότητα**
    του.
