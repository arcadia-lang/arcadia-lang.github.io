674fc488f569c57ccb44098fb9073dffc34cedd2e3fb8c6afd11fefe:
  original: "**Determiner Rules in Arcadia**"
  translated: "**Κανόνες προσδιοριστών στην Αρκάδια**"
236978b82a757689ab48a12f66c66f6e7e3b2d70e25d92c11feadf1b:
  original:
    "**A determiner is mandatory** unless the noun is in the **zero**, or
    **collective number**, where **no determiner normally used**."
  translated:
    "**Ένας προσδιοριστής είναι υποχρεωτικός** εκτός αν το ουσιαστικό είναι
    σε **μηδενικό**, ή **συλλογικό αριθμό**, όπου **δεν χρησιμοποιείται συνήθως προσδιοριστής**."
b157cbedb579676d752dd4c5098f64a35fc229a8a7b802d9d31417d2:
  original:
    "**Proper nouns** do **not** require a determiner but **can take one**
    when specificity needs to be emphasized."
  translated:
    "**Τα κύρια ονόματα** δεν απαιτούν προσδιοριστή αλλά **μπορούν να πάρουν
    έναν** όταν χρειάζεται να τονιστεί η ειδικότητα."
