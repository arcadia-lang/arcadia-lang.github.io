99e9f5f28aa1f6af6acee388e3415ba2cd2c01d14283c4596a027e88:
  original: Arcadian Verb Tense System
  translated: Χρόνοι στην Αρκάδια
bb0fb92f27fdfd5851426de47aeb2c415a57e589dd696b14873ef1ae:
  original: "Arcadia distinguishes between **four verb tenses**:"
  translated: "Η Αρκάδια έχει **τέσσερις χρόνους**:"
8a35948f7e86538d32015c419f4491036933316ca021c58f697f6bab:
  original: "**One timeless tense** (not bound by chronological time)"
  translated: "**Ένας άχρονος χρόνος**"
afa526673a3dba721148ae1a0cdac66fbc6166af819cc7c1626bc914:
  original: "**Three timed tenses** (anchored in past, present, or future)"
  translated: "**Τρεις χρονικοί χρόνοι**"
4633d4a1e879769370db5dc25406cdb231c0ba38453091838af7d01a:
  original: Tense indicates the **temporal framework** of a verb's action or
    state.
  translated: Ο χρόνος δείχνει το **χρονολογικό πλαίσιο** της ενέργειας ή της
    κατάστασης ενός ρήματος.
38894eedc1d5420957f04daf8f56dea36cae84989352b58cb336ab90:
  original:
    "[Aspect][aspect], however, is handled separately via aspectual modifiers
    and is **not embedded** in the tense suffix."
  translated:
    "[Το όψη][aspect], ωστόσο, διαχειρίζεται ξεχωριστά μέσω των λέξεων όψης
    και **δεν ενσωματώνεται** στο επίθημα χρόνου."
a16a5ae6a4098c409bdc986ccd2172c54099e66eb51db6c409d06a74:
  original: Tense is marked by **vowel-based suffixes**, which are appended to
    the verb stem **after** the `-ir` infinitive ending is dropped, and
    **before** the person-number suffix.
  translated: Ο χρόνος δηλώνεται με **επίθημα φωνηέντων**, τα οποία προστίθενται
    στο ριζικό του ρήματος **μετά** την κατάργηση του επιθήματος `-ir` και
    **πριν** το επίθημα προσώπου-αριθμού.
52fd5ad34ad8b057196a2c0e5aba3b596de61f49753309ab0262b585:
  original: Timeless Tense
  translated: Άχρονος Χρόνος
ffa9902aa18a30273fb7cbb1095c29b995f9b635ea1c6891d3720d42:
  original: Arcadia has a timeless tense, veritas, that captures states that
    aren't bound by time.
  translated: Η Αρκάδια έχει έναν άχρονο χρόνο, τον αληθινό, που αποτυπώνει
    καταστάσεις που δεν περιορίζονται από το χρόνο.
c1320d513b4cdef144599b9c6799c3ed1397051c0f8d2d401f5e2356:
  original: This tense is used for universal truths, scientific facts, or
    constants.
  translated: Αυτός ο χρόνος χρησιμοποιείται για καθολικές αλήθειες,
    επιστημονικά γεγονότα ή σταθερές.
7eacc7330369aec400cfa2b4035f2dc4a86b5903ca7854f6dea49b99:
  original: In indicative mood, it is expressed with the suffix `-uv`.
  translated: Στη οριστική, εκφράζεται με το επίθημα `-uv`.
e6093435b7c7836c71a62738829cad66e931f8b944a984a4075068a3:
