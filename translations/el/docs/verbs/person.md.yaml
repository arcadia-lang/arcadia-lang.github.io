9e1a7ba3b044ebb0bc3b9d77ab40c9934476a6e4c513434f256becd2:
  original: "Arcadian Verbal Conjugation: Person & Number"
  translated: "Κλίση Ρημάτων στην Αρκάδια: Πρόσωπο & Αριθμός"
9b71cc2eecf5a23076d8d31dc4ea021f4a668c70e17779179e838848:
  original: In Arcadia, verbs are conjugated using **person** and **number**,
    expressed through suffixes attached to the **verb stem**, after the
    **tense** suffix has been added.
  translated: Στην Αρκάδια, τα ρήματα κλίνονται χρησιμοποιώντας το **πρόσωπο**
    και τον **αριθμό**, που εκφράζονται μέσω επιθημάτων που προστίθενται στο
    **θέμα του ρήματος**, μετά την προσθήκη του επιθήματος **χρόνου**.
641759db91ff73ca0c6bbe91526889d6f130b98e97826bbb1abc3282:
  original: The stem is formed by dropping the `-ir` ending from the infinitive.
  translated: Το θέμα σχηματίζεται αφαιρώντας το κατάληξη `-ir` από το
    απαρέμφατο.
619ed0758503e8ca785573a0dcb1d88e0d6382822d34bfcf90ad4dec:
  original:
    "Arcadia is a **pro-drop** language: personal pronouns are omitted unless
    emphasis or disambiguation is required."
  translated:
    "Η Αρκαδία είναι μια **γλώσσα υπέρ της απόρριψης**: οι προσωπικές αντωνυμίες
    παραλείπονται εκτός εάν απαιτείται έμφαση ή αποσαφήνιση."
